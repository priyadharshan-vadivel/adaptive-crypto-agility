name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for LibOQS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc ninja-build libssl-dev

      - name: Build and install LibOQS
        run: |
          git clone --depth 1 https://github.com/open-quantum-safe/liboqs.git
          cd liboqs && mkdir build && cd build
          cmake -GNinja -DBUILD_SHARED_LIBS=ON .. -DCMAKE_BUILD_TYPE=Release
          ninja
          sudo ninja install
          sudo ldconfig

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=risk_engine --cov=crypto_engine \
            --cov-report=term-missing --cov-report=xml

      - name: Run full demo (smoke test)
        run: python scripts/full_demo.py

      - name: Run attack simulation (smoke test)
        run: python scripts/attack_simulation.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
